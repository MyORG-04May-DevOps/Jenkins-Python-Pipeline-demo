name: variables demo in workflow
on: 
    push:
        branches:
        - master
# environment variable -> global variable,
# can be used by all jobs and steps in the workflow
env:
    PYTHON_VERSION: 3.9
# refer the variable in the steps - ${{ env.VARIABLE_NAME }}
jobs:
    buildpythoncode-global:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            - name: Set up Python ${{ env.PYTHON_VERSION }}
              uses: actions/setup-python@v6
              with:
                python-version: ${{ env.PYTHON_VERSION }}
            - name: Print Python version
              run: python --version
    buildcode-python-job:
        env:
            PYTHON_VERSION_JOB: 3.11
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            - name: Set up Python ${{ env.PYTHON_VERSION_JOB}}
              uses: actions/setup-python@v6
              with:
                python-version: ${{ env.PYTHON_VERSION_JOB}}
            - name: Print Python version
              run: python --version
    build-code-python-step:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            - name: Set up Python ${{ env.PYTHON_VERSION_STEP}}
              env:
                PYTHON_VERSION_STEP: 3.12
              uses: actions/setup-python@v6
              with:
                python-version: ${{ env.PYTHON_VERSION_STEP}}
            - name: Print Python version
              run: python --version
